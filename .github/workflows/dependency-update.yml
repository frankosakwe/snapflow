name: Dependency Update

on:
  schedule:
    # Run weekly on Monday at 9:00 AM UTC
    - cron: '0 9 * * 1'
  workflow_dispatch:

jobs:
  update-dependencies:
    name: Update Dependencies
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v7
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Install pip-tools
      run: |
        python -m pip install --upgrade pip
        pip install pip-tools
    
    - name: Update requirements
      run: |
        pip-compile --upgrade requirements.txt || echo "No requirements.in found"
        pip-compile --upgrade requirements-dev.txt || echo "No requirements-dev.in found"
    
    - name: Create Pull Request
      uses: peter-evans/create-pull-request@v6
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
        commit-message: 'chore: Update Python dependencies'
        title: 'chore: Update Python dependencies'
        body: |
          ## Dependency Update
          
          This PR updates Python dependencies to their latest versions.
          
          ### Changes
          - Updated requirements.txt
          - Updated requirements-dev.txt
          
          ### Testing
          Please review the changes and ensure all tests pass.
          
          ---
          *Auto-generated by GitHub Actions*
        branch: dependency-update
        delete-branch: true
        labels: dependencies, automated
