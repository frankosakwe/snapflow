name: Close Stale Issues and PRs

on:
  schedule:
    # Run daily at 00:00 UTC
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  issues: write
  pull-requests: write

jobs:
  stale:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/stale@v9
      with:
        repo-token: ${{ secrets.GITHUB_TOKEN }}
        
        # Issues
        stale-issue-message: |
          This issue has been automatically marked as stale because it has not had recent activity. 
          It will be closed if no further activity occurs within 7 days.
          
          If this is still relevant, please comment to keep it open.
          Thank you for your contributions!
        close-issue-message: |
          This issue has been automatically closed due to inactivity.
          
          If you believe this is still relevant, feel free to reopen or create a new issue.
        days-before-issue-stale: 60
        days-before-issue-close: 7
        stale-issue-label: 'stale'
        exempt-issue-labels: 'bug,enhancement,pinned,security'
        
        # Pull Requests
        stale-pr-message: |
          This pull request has been automatically marked as stale because it has not had recent activity.
          It will be closed if no further activity occurs within 7 days.
          
          Please update this PR if you'd like to continue working on it.
        close-pr-message: |
          This pull request has been automatically closed due to inactivity.
          
          Feel free to reopen if you'd like to continue working on this.
        days-before-pr-stale: 30
        days-before-pr-close: 7
        stale-pr-label: 'stale'
        exempt-pr-labels: 'work-in-progress,blocked'
        
        # Other options
        operations-per-run: 100
        remove-stale-when-updated: true
        ascending: false
